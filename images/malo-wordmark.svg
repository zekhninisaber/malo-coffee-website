<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" fill="none" role="img" aria-label="malō">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&amp;display=swap');
    </style>
  </defs>

  <!--
    malō wordmark
    Font: Nunito 800 (ExtraBold) — matches brand rounded geometric sans
    Color: #EDE0C8 (warm beige / parchment — from vitrine lettering)
